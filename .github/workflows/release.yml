name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CGO_ENABLED: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            output: clawpro-darwin-arm64
            build_tags: ""
          - os: macos-latest
            platform: darwin/amd64
            output: clawpro-darwin-amd64
            build_tags: ""
            goarch: amd64
          - os: ubuntu-latest
            platform: linux/amd64
            output: clawpro-linux-amd64
            build_tags: webkit2_41
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            output: clawpro-linux-arm64
            build_tags: webkit2_41
          - os: windows-latest
            platform: windows/amd64
            output: clawpro-windows-amd64.exe
            build_tags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Convert icon to ICO (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install imagemagick -y --no-progress 2>/dev/null || true
          magick build/appicon.png -resize 256x256 -define icon:auto-resize=256,128,64,48,32,16 build/windows/icon.ico || \
          convert build/appicon.png -resize 256x256 -define icon:auto-resize=256,128,64,48,32,16 build/windows/icon.ico || \
          echo "Warning: Could not convert icon"

      - name: Build application
        env:
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          ARGS="-platform ${{ matrix.platform }} -o ${{ matrix.output }} -s"
          if [ -n "${{ matrix.build_tags }}" ]; then
            ARGS="$ARGS -tags ${{ matrix.build_tags }}"
          fi
          wails build $ARGS

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd build/bin
          npm install -g create-dmg || true
          create-dmg \
            --volname "ClawPro" \
            --background "../../build/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "ClawPro.app" 165 210 \
            --app-drop-link 495 210 \
            --no-internet-enable \
            "${{ matrix.output }}.dmg" \
            "ClawPro.app" \
          || {
            echo "create-dmg failed, falling back to hdiutil"
            mkdir -p dmg_tmp
            cp -R "ClawPro.app" dmg_tmp/
            ln -s /Applications dmg_tmp/Applications
            hdiutil create -volname "ClawPro" -srcfolder dmg_tmp -ov -format UDZO "${{ matrix.output }}.dmg"
            rm -rf dmg_tmp
          }

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        run: chmod +x build/bin/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: |
            build/bin/*.dmg
            build/bin/${{ matrix.output }}
            build/bin/${{ matrix.output }}.exe

  release:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClawPro ${{ github.ref_name }}
          body: |
            # ClawPro ${{ github.ref_name }}

            Chinese AI agent desktop client powered by OpenClaw.

            ---

            ## Downloads

            ### macOS

            | Chip | Download |
            |------|----------|
            | Apple Silicon (M1/M2/M3/M4) | [clawpro-darwin-arm64.dmg](https://github.com/TerrySiu98/clawpro/releases/download/${{ github.ref_name }}/clawpro-darwin-arm64.dmg) |
            | Intel | [clawpro-darwin-amd64.dmg](https://github.com/TerrySiu98/clawpro/releases/download/${{ github.ref_name }}/clawpro-darwin-amd64.dmg) |

            > macOS Gatekeeper fix: `xattr -cr /Applications/ClawPro.app`

            ### Windows

            | Arch | Download |
            |------|----------|
            | x64 | [clawpro-windows-amd64.exe](https://github.com/TerrySiu98/clawpro/releases/download/${{ github.ref_name }}/clawpro-windows-amd64.exe) |

            ### Linux

            | Arch | Download |
            |------|----------|
            | x64 | [clawpro-linux-amd64](https://github.com/TerrySiu98/clawpro/releases/download/${{ github.ref_name }}/clawpro-linux-amd64) |
            | ARM64 | [clawpro-linux-arm64](https://github.com/TerrySiu98/clawpro/releases/download/${{ github.ref_name }}/clawpro-linux-arm64) |

            **Linux CLI:** `curl -fsSL https://raw.githubusercontent.com/TerrySiu98/clawpro/main/install.sh | bash`

            ---

            Website: [clawpro.app](https://clawpro.app)
          files: artifacts/**/*
          draft: false
          prerelease: false
